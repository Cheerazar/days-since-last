name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate league data
        run: node scripts/validate-data.mjs
      - name: Unit and data tests
        run: npm test
      - name: Build static site
        run: npm run build
